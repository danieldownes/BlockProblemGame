<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="sans-serif">
  <style>
    text { fill: #e0e0e0; }
    .title { font-size: 14px; font-weight: bold; fill: #ccc; }
    .label { font-size: 10px; fill: #fff; text-anchor: middle; font-weight: bold; }
    .note { font-size: 11px; fill: #aaa; }
    .step { font-size: 12px; fill: #5dade2; font-weight: bold; }
    .fail { font-size: 11px; fill: #e74c3c; font-weight: bold; }
    .ok { font-size: 11px; fill: #2ecc71; font-weight: bold; }
  </style>
  <rect width="700" height="380" rx="8" fill="#1a1a2e"/>

  <text x="350" y="24" class="title" text-anchor="middle">Backtracking with Forward Checking</text>
  <text x="350" y="42" class="note" text-anchor="middle">The solver fills left-to-right, top-to-bottom, checking the compatibility graph at each step</text>

  <!-- Row of grid cells showing fill order -->
  <g transform="translate(30, 60)">
    <!-- 4x4 mini grid showing fill order -->
    <text x="0" y="12" class="step">Fill order:</text>

    <!-- Row 0 -->
    <rect x="90" y="0" width="30" height="30" fill="#1a3a2a" rx="3" stroke="#2ecc71" stroke-width="1.5"/>
    <text x="105" y="20" class="label">1</text>
    <text x="123" y="15" fill="#2ecc71" font-size="16">&#8594;</text>
    <rect x="135" y="0" width="30" height="30" fill="#1a3a2a" rx="3" stroke="#2ecc71" stroke-width="1.5"/>
    <text x="150" y="20" class="label">2</text>
    <text x="168" y="15" fill="#2ecc71" font-size="16">&#8594;</text>
    <rect x="180" y="0" width="30" height="30" fill="#1a3a2a" rx="3" stroke="#2ecc71" stroke-width="1.5"/>
    <text x="195" y="20" class="label">3</text>
    <text x="213" y="15" fill="#2ecc71" font-size="16">&#8594;</text>
    <rect x="225" y="0" width="30" height="30" fill="#1a3a2a" rx="3" stroke="#2ecc71" stroke-width="1.5"/>
    <text x="240" y="20" class="label">4</text>

    <!-- Arrow down -->
    <text x="240" y="46" fill="#2ecc71" font-size="14" text-anchor="middle">&#8595;</text>

    <!-- Row 1 -->
    <rect x="90" y="35" width="30" height="30" fill="#16162a" rx="3" stroke="#2a2a44" stroke-width="1.5"/>
    <text x="105" y="55" class="label" fill="#666">8</text>
    <rect x="135" y="35" width="30" height="30" fill="#16162a" rx="3" stroke="#2a2a44" stroke-width="1.5"/>
    <text x="150" y="55" class="label" fill="#666">7</text>
    <rect x="180" y="35" width="30" height="30" fill="#16162a" rx="3" stroke="#2a2a44" stroke-width="1.5"/>
    <text x="195" y="55" class="label" fill="#666">6</text>
    <rect x="225" y="35" width="30" height="30" fill="#16162a" rx="3" stroke="#2a2a44" stroke-width="1.5"/>
    <text x="240" y="55" class="label" fill="#666">5</text>

    <text x="275" y="20" class="note">... and so on</text>
  </g>

  <!-- Step-by-step illustration -->
  <!-- Step 1: Place first block -->
  <g transform="translate(30, 140)">
    <text x="0" y="15" class="step">Step 1</text>
    <text x="0" y="30" class="note">Place block at [0,0]</text>
    <text x="0" y="44" class="note">No neighbours yet</text>
    <text x="0" y="58" class="note">&#8594; any block fits</text>

    <!-- Mini block -->
    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="50" height="50" fill="#2c2c44" rx="3"/>
      <polygon points="0,0 50,0 25,25" fill="#2ecc71" opacity="0.85"/>
      <polygon points="50,0 50,50 25,25" fill="#e74c3c" opacity="0.85"/>
      <polygon points="50,50 0,50 25,25" fill="#f1c40f" opacity="0.85"/>
      <polygon points="0,50 0,0 25,25" fill="#3498db" opacity="0.85"/>
      <rect x="0" y="0" width="50" height="50" fill="none" stroke="#2ecc71" stroke-width="2" rx="3"/>
    </g>
    <text x="45" y="140" class="ok" text-anchor="middle">Placed</text>
  </g>

  <!-- Arrow -->
  <text x="155" y="210" fill="#5dade2" font-size="20">&#8594;</text>

  <!-- Step 2: Place second, check left -->
  <g transform="translate(175, 140)">
    <text x="0" y="15" class="step">Step 2</text>
    <text x="0" y="30" class="note">Place block at [0,1]</text>
    <text x="0" y="44" class="note">Check: left neighbour's</text>
    <text x="0" y="58" class="note">Right = this block's Left?</text>

    <!-- Two mini blocks -->
    <g transform="translate(0, 70)">
      <!-- Block from step 1 (faded) -->
      <rect x="0" y="0" width="50" height="50" fill="#2c2c44" rx="3" opacity="0.5"/>
      <polygon points="0,0 50,0 25,25" fill="#2ecc71" opacity="0.4"/>
      <polygon points="50,0 50,50 25,25" fill="#e74c3c" opacity="0.4"/>
      <polygon points="50,50 0,50 25,25" fill="#f1c40f" opacity="0.4"/>
      <polygon points="0,50 0,0 25,25" fill="#3498db" opacity="0.4"/>
      <rect x="0" y="0" width="50" height="50" fill="none" stroke="#555" stroke-width="1" rx="3"/>

      <!-- Matching indicator -->
      <line x1="50" y1="25" x2="55" y2="25" stroke="#2ecc71" stroke-width="3"/>

      <!-- New block -->
      <rect x="55" y="0" width="50" height="50" fill="#2c2c44" rx="3"/>
      <polygon points="55,0 105,0 80,25" fill="#f1c40f" opacity="0.85"/>
      <polygon points="105,0 105,50 80,25" fill="#3498db" opacity="0.85"/>
      <polygon points="105,50 55,50 80,25" fill="#2ecc71" opacity="0.85"/>
      <polygon points="55,50 55,0 80,25" fill="#e74c3c" opacity="0.85"/>
      <rect x="55" y="0" width="50" height="50" fill="none" stroke="#2ecc71" stroke-width="2" rx="3"/>
    </g>
    <text x="55" y="140" class="ok" text-anchor="middle">Red = Red</text>
  </g>

  <!-- Arrow -->
  <text x="330" y="210" fill="#5dade2" font-size="20">&#8594;</text>

  <!-- Step 3: Fail and backtrack -->
  <g transform="translate(350, 140)">
    <text x="0" y="15" class="step">Step 3</text>
    <text x="0" y="30" class="note">Try block at [0,2]</text>
    <text x="0" y="44" class="note">Left neighbour's Right</text>
    <text x="0" y="58" class="note">&#x2260; this block's Left</text>

    <g transform="translate(0, 70)">
      <!-- Previous block (faded) -->
      <rect x="0" y="0" width="50" height="50" fill="#2c2c44" rx="3" opacity="0.5"/>
      <polygon points="0,0 50,0 25,25" fill="#f1c40f" opacity="0.4"/>
      <polygon points="50,0 50,50 25,25" fill="#3498db" opacity="0.4"/>
      <polygon points="50,50 0,50 25,25" fill="#2ecc71" opacity="0.4"/>
      <polygon points="0,50 0,0 25,25" fill="#e74c3c" opacity="0.4"/>
      <rect x="0" y="0" width="50" height="50" fill="none" stroke="#555" stroke-width="1" rx="3"/>

      <!-- X indicator -->
      <line x1="48" y1="18" x2="58" y2="32" stroke="#e74c3c" stroke-width="2.5"/>
      <line x1="58" y1="18" x2="48" y2="32" stroke="#e74c3c" stroke-width="2.5"/>

      <!-- Failing block -->
      <rect x="55" y="0" width="50" height="50" fill="#2c2c44" rx="3"/>
      <polygon points="55,0 105,0 80,25" fill="#2ecc71" opacity="0.85"/>
      <polygon points="105,0 105,50 80,25" fill="#e74c3c" opacity="0.85"/>
      <polygon points="105,50 55,50 80,25" fill="#f1c40f" opacity="0.85"/>
      <polygon points="55,50 55,0 80,25" fill="#3498db" opacity="0.85"/>
      <rect x="55" y="0" width="50" height="50" fill="none" stroke="#e74c3c" stroke-width="2" rx="3"/>
    </g>
    <text x="55" y="140" class="fail" text-anchor="middle">Blue &#x2260; Blue</text>
    <text x="55" y="155" class="fail" text-anchor="middle">Skip!</text>
  </g>

  <!-- Arrow -->
  <text x="500" y="210" fill="#5dade2" font-size="20">&#8594;</text>

  <!-- Step 4: Try next candidate -->
  <g transform="translate(520, 140)">
    <text x="0" y="15" class="step">Step 3b</text>
    <text x="0" y="30" class="note">Try next candidate</text>
    <text x="0" y="44" class="note">from compatibility graph</text>

    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="50" height="50" fill="#2c2c44" rx="3" opacity="0.5"/>
      <polygon points="0,0 50,0 25,25" fill="#f1c40f" opacity="0.4"/>
      <polygon points="50,0 50,50 25,25" fill="#3498db" opacity="0.4"/>
      <polygon points="50,50 0,50 25,25" fill="#2ecc71" opacity="0.4"/>
      <polygon points="0,50 0,0 25,25" fill="#e74c3c" opacity="0.4"/>
      <rect x="0" y="0" width="50" height="50" fill="none" stroke="#555" stroke-width="1" rx="3"/>

      <line x1="50" y1="25" x2="55" y2="25" stroke="#2ecc71" stroke-width="3"/>

      <!-- Better fitting block -->
      <rect x="55" y="0" width="50" height="50" fill="#2c2c44" rx="3"/>
      <polygon points="55,0 105,0 80,25" fill="#f1c40f" opacity="0.85"/>
      <polygon points="105,0 105,50 80,25" fill="#e74c3c" opacity="0.85"/>
      <polygon points="105,50 55,50 80,25" fill="#2ecc71" opacity="0.85"/>
      <polygon points="55,50 55,0 80,25" fill="#3498db" opacity="0.85"/>
      <rect x="55" y="0" width="50" height="50" fill="none" stroke="#2ecc71" stroke-width="2" rx="3"/>
    </g>
    <text x="55" y="140" class="ok" text-anchor="middle">Blue = Blue</text>
  </g>

  <!-- Summary at bottom -->
  <g transform="translate(30, 310)">
    <rect x="0" y="0" width="640" height="55" fill="#0e0e1a" rx="6" stroke="#333" stroke-width="1"/>
    <text x="320" y="20" class="note" text-anchor="middle">The compatibility graph acts as a pre-computed lookup table.</text>
    <text x="320" y="38" class="note" text-anchor="middle">Instead of comparing colours each time, the solver asks: "is there an edge between these two nodes?"</text>
  </g>
</svg>
